---
name: "Update vsphere-csi-driver version"

sources:
  upstream:
    name: Get vsphere-csi-driver version
    kind: githubrelease
    spec:
      owner: kubernetes-sigs
      repository: vsphere-csi-driver
      token: '{{ requiredEnv .github.token }}'
      typefilter:
        release: true
        draft: false
        prerelease: false
      versionfilter:
        kind: semver

targets:
  makefile:
    name: "Bump to latest vsphere-csi-driver version in Makefile"
    kind: file
    scmid: default
    disablesourceinput: true
    spec:
      file: Makefile
      matchpattern: '(?m)^TAG \:\= (.*)'
      replacepattern: 'TAG := {{ source "upstream" }}$$(BUILD_META)'

scms:
  default:
    kind: github
    spec:
      token: '{{ requiredEnv .github.token }}'
      username: '{{ .github.username }}'
      user: '{{ .github.username }}'
      email: '{{ .github.email }}'
      owner: '{{ .github.owner }}'
      repository: '{{ .github.repository }}'
      branch: '{{ .github.branch }}'

actions:
  default:
    title: 'Bump vsphere-csi-driver version to {{ source "upstream" }}'
    kind: github/pullrequest
    spec:
      automerge: false
    scmid: default
